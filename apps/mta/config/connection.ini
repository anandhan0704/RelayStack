[main]
spool_after=-1
strict_rfc1869=false
smtputf8=true

[haproxy]
hosts[] =

[headers]
max_lines=1000
max_received=100

[max]
bytes=26214400
mime_parts=1000
line_length=512
data_line_length=992

[message]
helo=RelayStack MTA is ready.
close=RelayStack MTA closing connection.

[uuid]
banner_chars=6
deny_chars=0
